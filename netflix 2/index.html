<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de seleção de perfis da Netflix">
    <title>Netflix - Quem está assistindo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo</h1>
        <button id="theme-toggle" type="button" aria-label="Alternar para modo escuro">🌙</button>
    </header>
    <nav aria-label="Navegação de perfis">
        <ul class="profiles">
            <li>
                <button class="profile" type="button" aria-label="Selecionar Henrique">
                    <img src="assets/perfil-1.jpg" alt="Ilustração em estilo anime de um jovem de cabelos brancos e olhos roxos sorrindo em uma rua movimentada com cerejeiras ao fundo.">
                    <span>Henrique</span>
                </button>
            </li>
            <li>
                <button class="profile" type="button" aria-label="Selecionar Akari">
                    <img src="assets/perfil-2.jpg" alt="Ilustração em estilo anime de uma jovem de longos cabelos castanhos e olhos roxos, sorrindo com um uniforme escolar azul sob cerejeiras.">
                    <span>Akari</span>
                </button>
            </li>
            <li>
                <button class="profile" type="button" aria-label="Selecionar Duda">
                    <img src="assets/perfil-3.jpg" alt="Ilustração em estilo anime de uma menina">
                    <span>Duda</span>
                </button>
            </li>
            <li>
                <button class="profile" type="button" aria-label="Selecionar Ryuji">
                    <img src="assets/perfil-4.jpg" alt="Ilustração em estilo anime de um jovem com cabelos escuros e expressão determinada">
                    <span>Ryuji</span>
                </button>
            </li>
        </ul>
    </nav>
    <script src="script.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
